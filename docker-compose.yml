services:
  rmp-sidecar:
    build:
      context: .
      dockerfile: sidecar/Dockerfile
    container_name: rmp-sidecar
    restart: unless-stopped
    env_file: .env
    ports:
      - "${RMP_SIDECAR_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 512M
